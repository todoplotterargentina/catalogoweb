<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --surface:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#6C5CE7;
      --primary2:#8B7CF0;
      --accent:#00CEC9;
      --border:#e5e7eb;
      --shadow:0 10px 30px rgba(31,41,55,.08);
      --radius:18px;
      --danger:#dc2626;
      --ok:#15803d;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Segoe UI, Arial, sans-serif;
      background:linear-gradient(180deg,#f8f9fc 0%, #f3f5fb 100%);
      color:var(--text);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:22px 14px 40px;
    }

    .hero{
      background:linear-gradient(135deg,rgba(108,92,231,.12),rgba(0,206,201,.10));
      border:1px solid rgba(108,92,231,.12);
      border-radius:22px;
      padding:24px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    h1{
      margin:0 0 8px;
      font-size:34px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      font-size:16px;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }

    .panel h2{
      margin:0 0 14px;
      font-size:20px;
    }

    .datos-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:12px;
    }

    .campo label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
      color:var(--muted);
    }

    .campo input,
    .campo select{
      width:100%;
      height:46px;
      border:1px solid var(--border);
      border-radius:12px;
      padding:0 12px;
      font-size:15px;
      outline:none;
      background:#fff;
    }

    .campo input:focus,
    .campo select:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(108,92,231,.12);
    }

    .estado-datos{
      margin-top:12px;
      font-size:14px;
      font-weight:700;
    }

    .ok{ color:var(--ok); }
    .error{ color:var(--danger); }

    .resumen{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    .stat{
      background:#fff;
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px 14px;
      color:var(--muted);
      font-size:14px;
    }

    .stat strong{
      color:var(--text);
    }

    .acciones{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }

    .btn{
      border:none;
      cursor:pointer;
      border-radius:14px;
      padding:12px 16px;
      font-size:14px;
      font-weight:700;
      text-decoration:none;
      transition:.18s transform,.18s opacity;
    }

    .btn:hover{ transform:translateY(-1px); }

    .btn-primary{
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;
      box-shadow:var(--shadow);
    }

    .btn-secondary{
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }

    .btn-whatsapp{
      background:#25D366;
      color:#fff;
      box-shadow:var(--shadow);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
      margin-top:12px;
    }

    .card-link{
      display:block;
      text-decoration:none;
      color:inherit;
      background:#fff;
      border:1px solid var(--border);
      border-radius:20px;
      padding:24px;
      box-shadow:var(--shadow);
      transition:.18s transform,.18s box-shadow;
    }

    .card-link:hover{
      transform:translateY(-3px);
      box-shadow:0 16px 34px rgba(31,41,55,.12);
    }

    .card-link strong{
      display:block;
      font-size:24px;
      margin-bottom:8px;
    }

    .card-link span{
      color:var(--muted);
      font-size:14px;
    }

    @media (max-width:700px){
      h1{ font-size:28px; }
      .acciones .btn{ flex:1 1 auto; text-align:center; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Catálogo</h1>
      <p>Completá tus datos, elegí material y medida, y después armá tu pedido sin errores.</p>
    </section>

    <section class="panel">
      <h2>Datos del cliente</h2>

      <div class="datos-grid">
        <div class="campo">
          <label for="nombreApellido">Nombre y apellido</label>
          <input id="nombreApellido" type="text" placeholder="Ej: Pedro Alfonzo">
        </div>

        <div class="campo">
          <label for="telefono">Teléfono</label>
          <input id="telefono" type="tel" placeholder="Ej: 11502521521">
        </div>

        <div class="campo">
          <label for="material">Material</label>
          <select id="material">
            <option value="">Seleccionar material</option>
            <option value="blanco">Blanco</option>
            <option value="tornasolado_holografico">Tornasolado/Holografico</option>
          </select>
        </div>

        <div class="campo">
          <label for="medida">Medida</label>
          <select id="medida">
            <option value="">Seleccionar medida</option>
            <option value="10cm">10cm</option>
            <option value="8cm">8cm</option>
            <option value="6cm">6cm</option>
          </select>
        </div>
      </div>

      <div id="estadoDatos" class="estado-datos error">Faltan completar datos del pedido.</div>

      <div class="resumen">
        <div class="stat" id="resModelos"></div>
        <div class="stat" id="resUnidades"></div>
        <div class="stat" id="resMaterial"></div>
        <div class="stat" id="resMedida"></div>
      </div>

      <div class="acciones">
        <button id="exportarTodo" class="btn btn-primary" type="button">Exportar pedido completo</button>
        <button id="enviarWhatsapp" class="btn btn-whatsapp" type="button">Enviar por WhatsApp</button>
        <button id="vaciarTodo" class="btn btn-secondary" type="button">Vaciar pedido</button>
      </div>
    </section>

    <section class="grid">
      <a class="card-link" href="parte1.html">
        <strong>Parte 1</strong>
        <span>Primer bloque de modelos</span>
      </a>

      <a class="card-link" href="parte2.html">
        <strong>Parte 2</strong>
        <span>Segundo bloque de modelos</span>
      </a>

      <a class="card-link" href="parte3.html">
        <strong>Parte 3</strong>
        <span>Tercer bloque de modelos</span>
      </a>
    </section>
  </div>

  <script>
    const STORAGE_PEDIDO = "catalogo_pedido";
    const STORAGE_CLIENTE = "catalogo_cliente";

    function leerPedido() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_PEDIDO)) || {};
      } catch {
        return {};
      }
    }

    function guardarPedido(pedido) {
      localStorage.setItem(STORAGE_PEDIDO, JSON.stringify(pedido));
    }

    function leerCliente() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_CLIENTE)) || {
          nombreApellido: "",
          telefono: "",
          material: "",
          medida: ""
        };
      } catch {
        return {
          nombreApellido: "",
          telefono: "",
          material: "",
          medida: ""
        };
      }
    }

    function guardarCliente(cliente) {
      localStorage.setItem(STORAGE_CLIENTE, JSON.stringify(cliente));
    }

    function nombreModelo(n) {
      return n.replace(/\.[^.]+$/, "");
    }

    function ordenarModelos(lista) {
      return [...lista].sort((a, b) => {
        const aNum = /^\d+$/.test(a) ? parseInt(a, 10) : NaN;
        const bNum = /^\d+$/.test(b) ? parseInt(b, 10) : NaN;

        if (!isNaN(aNum) && !isNaN(bNum)) return aNum - bNum;

        return a.localeCompare(b, undefined, {
          numeric: true,
          sensitivity: "base"
        });
      });
    }

    function dividirCantidad(lineas, modelo, cantidad) {
      let restante = cantidad;
      while (restante > 0) {
        const tramo = restante >= 9 ? 9 : restante;
        lineas.push(modelo + "," + tramo);
        restante -= tramo;
      }
    }

    function clienteCompleto(cliente) {
      return (
        cliente.nombreApellido.trim() !== "" &&
        cliente.telefono.trim() !== "" &&
        cliente.material.trim() !== "" &&
        cliente.medida.trim() !== ""
      );
    }

    function limpiarTextoArchivo(texto) {
      return texto
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, "_")
        .replace(/[^\w\-]/g, "");
    }

    function totalUnidades(pedido) {
      let unidades = 0;
      for (const archivo in pedido) {
        unidades += parseInt(pedido[archivo], 10) || 0;
      }
      return unidades;
    }

    function textoMaterialConfirmacion(material) {
      if (material === "blanco") return "Blancas";
      if (material === "tornasolado_holografico") return "Tornasoladas/Holográficas";
      return material;
    }

    function textoMaterialArchivo(material) {
      if (material === "blanco") return "blanco";
      if (material === "tornasolado_holografico") return "tornasolado_holografico";
      return material;
    }

    function actualizarResumen() {
      const pedido = leerPedido();
      const cliente = leerCliente();

      let modelos = 0;
      let unidades = 0;

      for (const archivo in pedido) {
        const cant = parseInt(pedido[archivo], 10) || 0;
        if (cant > 0) {
          modelos++;
          unidades += cant;
        }
      }

      document.getElementById("resModelos").innerHTML = "<strong>Modelos:</strong> " + modelos;
      document.getElementById("resUnidades").innerHTML = "<strong>Calcos:</strong> " + unidades;
      document.getElementById("resMaterial").innerHTML = "<strong>Material:</strong> " + (cliente.material ? textoMaterialArchivo(cliente.material) : "-");
      document.getElementById("resMedida").innerHTML = "<strong>Medida:</strong> " + (cliente.medida || "-");
    }

    function actualizarEstadoDatos() {
      const cliente = leerCliente();
      const estado = document.getElementById("estadoDatos");

      if (clienteCompleto(cliente)) {
        estado.textContent = "Datos completos. Ya podés exportar o enviar el pedido.";
        estado.className = "estado-datos ok";
      } else {
        estado.textContent = "Faltan completar nombre y apellido, teléfono, material o medida.";
        estado.className = "estado-datos error";
      }
    }

    function cargarFormulario() {
      const cliente = leerCliente();
      document.getElementById("nombreApellido").value = cliente.nombreApellido || "";
      document.getElementById("telefono").value = cliente.telefono || "";
      document.getElementById("material").value = cliente.material || "";
      document.getElementById("medida").value = cliente.medida || "";
      actualizarEstadoDatos();
    }

    function guardarFormulario() {
      const cliente = {
        nombreApellido: document.getElementById("nombreApellido").value.trim(),
        telefono: document.getElementById("telefono").value.trim(),
        material: document.getElementById("material").value.trim(),
        medida: document.getElementById("medida").value.trim()
      };

      guardarCliente(cliente);
      actualizarEstadoDatos();
      actualizarResumen();
    }

    function confirmarPedido() {
      const cliente = leerCliente();
      const pedido = leerPedido();
      const unidades = totalUnidades(pedido);

      if (!clienteCompleto(cliente)) {
        alert("Completá nombre y apellido, teléfono, material y medida antes de continuar.");
        return false;
      }

      if (unidades <= 0) {
        alert("No hay modelos cargados en el pedido.");
        return false;
      }

      const mensaje = 'Tu pedido de "' + unidades + '" calcos "' + textoMaterialConfirmacion(cliente.material) + '" de "' + cliente.medida + '" ¿es correcto?';
      return confirm(mensaje);
    }

    function exportarTodo() {
      const cliente = leerCliente();
      const pedido = leerPedido();

      if (!confirmarPedido()) return;

      const modelos = Object.keys(pedido).filter(k => (parseInt(pedido[k], 10) || 0) > 0);
      if (!modelos.length) {
        alert("No hay datos");
        return;
      }

      const ordenados = ordenarModelos(modelos.map(nombreModelo));
      const pedidoPorModelo = {};

      for (const archivo in pedido) {
        const modelo = nombreModelo(archivo);
        pedidoPorModelo[modelo] = parseInt(pedido[archivo], 10) || 0;
      }

      const lineas = ["modelo,cantidad"];

      for (const modelo of ordenados) {
        const cant = pedidoPorModelo[modelo] || 0;
        if (cant > 0) {
          dividirCantidad(lineas, modelo, cant);
        }
      }

      const nombreArchivo =
        limpiarTextoArchivo(cliente.nombreApellido) + "_" +
        limpiarTextoArchivo(cliente.telefono) + "_" +
        limpiarTextoArchivo(cliente.medida + "_" + textoMaterialArchivo(cliente.material)) + ".csv";

      const blob = new Blob([lineas.join("\n")], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = nombreArchivo;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(url);
    }

    function enviarWhatsapp() {
      const cliente = leerCliente();
      const pedido = leerPedido();

      if (!confirmarPedido()) return;

      const modelos = Object.keys(pedido).filter(k => (parseInt(pedido[k], 10) || 0) > 0);
      if (!modelos.length) {
        alert("No hay datos");
        return;
      }

      const ordenados = ordenarModelos(modelos);
      const unidades = totalUnidades(pedido);

      const lineas = [];
      lineas.push("Hola, te envío mi pedido:");
      lineas.push("");
      lineas.push("Nombre y apellido: " + cliente.nombreApellido);
      lineas.push("Teléfono: " + cliente.telefono);
      lineas.push("Material: " + textoMaterialArchivo(cliente.material));
      lineas.push("Medida: " + cliente.medida);
      lineas.push("Total de calcos: " + unidades);
      lineas.push("");
      lineas.push("Detalle:");

      for (const archivo of ordenados) {
        const cant = parseInt(pedido[archivo], 10) || 0;
        if (cant > 0) {
          lineas.push("- " + nombreModelo(archivo) + " x " + cant);
        }
      }

      const texto = encodeURIComponent(lineas.join("\n"));
      window.open("https://wa.me/?text=" + texto, "_blank");
    }

    document.getElementById("nombreApellido").addEventListener("input", guardarFormulario);
    document.getElementById("telefono").addEventListener("input", guardarFormulario);
    document.getElementById("material").addEventListener("change", guardarFormulario);
    document.getElementById("medida").addEventListener("change", guardarFormulario);

    document.getElementById("exportarTodo").onclick = exportarTodo;
    document.getElementById("enviarWhatsapp").onclick = enviarWhatsapp;

    document.getElementById("vaciarTodo").onclick = () => {
      if (!confirm("¿Seguro que querés vaciar todo el pedido?")) return;
      guardarPedido({});
      actualizarResumen();
      alert("Pedido vaciado.");
    };

    cargarFormulario();
    actualizarResumen();
  </script>
</body>
</html>
