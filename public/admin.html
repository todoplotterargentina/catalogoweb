<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de pedidos</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: white;
      border-bottom: 1px solid #ddd;
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .topbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .topbar h1 {
      margin: 0;
      font-size: 22px;
    }

    .acciones-top {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .acciones-top a,
    .acciones-top button {
      padding: 10px 14px;
      font-size: 14px;
      border: none;
      background: #111;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .subinfo {
      margin-top: 8px;
      color: #555;
      font-size: 14px;
    }

    main {
      padding: 16px;
    }

    .estado {
      margin-bottom: 12px;
      font-size: 14px;
      color: #555;
    }

    .lista {
      display: grid;
      gap: 12px;
    }

    .pedido {
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      padding: 14px;
    }

    .pedido-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .codigo {
      font-size: 20px;
      font-weight: bold;
    }

    .fecha {
      color: #666;
      font-size: 14px;
    }

    .datos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 8px 16px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .dato strong {
      display: inline-block;
      min-width: 90px;
    }

    .pedido-acciones {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pedido-acciones a {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 8px;
      background: #111;
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .vacio {
      text-align: center;
      padding: 30px;
      color: #777;
      background: white;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <header>
    <div class="topbar">
      <h1>Panel de pedidos</h1>
      <div class="acciones-top">
        <a href="index.html">Ir a la web</a>
        <button onclick="cargarPedidos()">Actualizar</button>
      </div>
    </div>
    <div class="subinfo" id="subinfo">Cargando pedidos...</div>
  </header>

  <main>
    <div class="estado" id="estado"></div>
    <div class="lista" id="listaPedidos"></div>
  </main>

  <script>
    function formatoPesos(valor) {
      return "$" + Number(valor || 0).toLocaleString("es-AR");
    }

    function formatearFecha(fechaISO) {
      if (!fechaISO) return "-";

      const fecha = new Date(fechaISO);

      return fecha.toLocaleString("es-AR", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function cargarPedidos() {
      const estado = document.getElementById("estado");
      const lista = document.getElementById("listaPedidos");
      const subinfo = document.getElementById("subinfo");

      estado.textContent = "Cargando pedidos...";
      lista.innerHTML = "";
      subinfo.textContent = "Consultando pedidos guardados...";

      try {
        const response = await fetch("/api/pedidos");
        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "No se pudieron cargar los pedidos.");
        }

        const pedidos = Array.isArray(data.pedidos) ? data.pedidos : [];

        subinfo.textContent = `Pedidos encontrados: ${pedidos.length}`;
        estado.textContent = "";

        if (!pedidos.length) {
          lista.innerHTML = `<div class="vacio">Todavía no hay pedidos guardados.</div>`;
          return;
        }

        lista.innerHTML = pedidos.map(pedido => `
          <div class="pedido">
            <div class="pedido-top">
              <div class="codigo">${pedido.codigo}</div>
              <div class="fecha">${formatearFecha(pedido.fecha)}</div>
            </div>

            <div class="datos">
              <div class="dato"><strong>Cliente:</strong> ${pedido.cliente || "-"}</div>
              <div class="dato"><strong>Localidad:</strong> ${pedido.localidad || "-"}</div>
              <div class="dato"><strong>Teléfono:</strong> ${pedido.telefono || "-"}</div>
              <div class="dato"><strong>Material:</strong> ${pedido.material || "-"}</div>
              <div class="dato"><strong>Medida:</strong> ${pedido.medida || "-"}</div>
              <div class="dato"><strong>Cantidad:</strong> ${pedido.totalCantidad || 0}</div>
              <div class="dato"><strong>Unitario:</strong> ${formatoPesos(pedido.precioUnitario)}</div>
              <div class="dato"><strong>Total:</strong> ${formatoPesos(pedido.precioTotal)}</div>
            </div>

            <div class="pedido-acciones">
              <a href="/api/pedidos/${pedido.codigo}/csv" target="_blank">Descargar CSV</a>
            </div>
          </div>
        `).join("");
      } catch (error) {
        estado.textContent = error.message || "Ocurrió un error al cargar los pedidos.";
        subinfo.textContent = "Error al consultar pedidos.";
      }
    }

    cargarPedidos();
  </script>
</body>
</html>
