<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo 2</title>

<style>
body { font-family: Arial; margin:0; }
#catalogo {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
  padding:10px;
}
.card {
  border:1px solid #ddd;
  padding:5px;
  text-align:center;
}
img { width:100%; }
.controles { display:flex; justify-content:center; gap:5px; }
button { padding:5px 10px; }
</style>
</head>

<body>

<h2 style="text-align:center;">Catálogo 2</h2>

<div id="catalogo"></div>

<button onclick="descargarCSV()" style="position:fixed;bottom:10px;right:10px;">
Enviar pedido
</button>

<script src="archivos2.js"></script>

<script>
const BASE_URL = "https://catalogotodoplotter.b-cdn.net/";

let pedido = {};

function urlImagen(archivo){
  return BASE_URL + archivo + ".jpg";
}

function crearCard(archivo){
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="${urlImagen(archivo)}" loading="lazy">
    <p>${archivo}</p>
    <div class="controles">
      <button onclick="menos('${archivo}')">-</button>
      <input id="i_${archivo}" type="number" value="0" min="0" style="width:50px">
      <button onclick="mas('${archivo}')">+</button>
    </div>
  `;

  return div;
}

function cargar(){
  ARCHIVOS.forEach(a=>{
    catalogo.appendChild(crearCard(a));
  });
}

function mas(a){
  let v = parseInt(document.getElementById("i_"+a).value)||0;
  v++;
  document.getElementById("i_"+a).value = v;
  pedido[a]=v;
}

function menos(a){
  let v = parseInt(document.getElementById("i_"+a).value)||0;
  if(v>0)v--;
  document.getElementById("i_"+a).value = v;

  if(v===0) delete pedido[a];
  else pedido[a]=v;
}

function descargarCSV(){
  let lineas = ["modelo,cantidad"];

  Object.keys(pedido).forEach(a=>{
    let cant = pedido[a];

    while(cant>0){
      let t = cant>=9?9:cant;
      lineas.push(a+","+t);
      cant-=t;
    }
  });

  let blob = new Blob([lineas.join("\n")], {type:"text/csv"});
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "pedido.csv";
  a.click();
}

cargar();
</script>
</body>
</html>
